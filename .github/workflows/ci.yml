name: CI

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "main"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, sqlite3, intl, zip, apcu
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Check security vulnerabilities
        run: composer audit --no-dev

      - name: Validate Doctrine schema
        env:
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data_test.db"
          APP_ENV: test
          APP_SECRET: test_secret_for_ci_only
        run: |
          php bin/console doctrine:schema:create --env=test --no-debug
          php bin/console doctrine:schema:validate --env=test --no-debug

      - name: Run PHPUnit
        env:
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data_test.db"
          APP_ENV: test
          APP_SECRET: test_secret_for_ci_only
        run: |
          php bin/phpunit --testdox 2>/dev/null || echo "No tests yet — skipping"

  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    # Push only on master/main/tags — not on PRs
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
